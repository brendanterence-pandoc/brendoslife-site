<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Brendo's Life</title>
  <meta name="description" content="A personal landing page for Brendan O'Connor." />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Inter:wght@400;500;600;700&display=swap"
  />
  <style>
    :root {
      --bg-navy: #0a1628;
      --bg-navy-2: #0d1a30;
      --accent-gold: #c4973b;
      --accent-gold-dark: #a67d2e;
      --accent-steel: #3a6b8c;
      --bg-cream: #f7f6f2;
      --border-light: rgba(212, 209, 202, 0.18);
      --text-primary: #f7f6f2;
      --text-muted: #b9b6ad;
      --font-heading: "Source Serif 4", Georgia, "Times New Roman", serif;
      --font-body: "Inter", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg-navy);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(1200px 600px at 85% -10%, rgba(196, 151, 59, 0.10), transparent 70%),
        radial-gradient(900px 500px at -10% 30%, rgba(58, 107, 140, 0.12), transparent 70%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 56px 40px 80px;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 72px;
      align-items: center;
      min-height: 100vh;
    }

    .content { max-width: 600px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 28px;
    }

    .eyebrow::before {
      content: "";
      width: 36px;
      height: 1px;
      background: var(--accent-gold);
    }

    h1 {
      font-family: var(--font-heading);
      font-weight: 500;
      font-size: clamp(2.8rem, 5vw, 4.4rem);
      line-height: 1.05;
      letter-spacing: -0.015em;
      color: var(--text-primary);
      margin-bottom: 22px;
    }

    h1 em {
      font-style: italic;
      color: var(--accent-gold);
      font-weight: 500;
    }

    .intro {
      font-size: 1.08rem;
      color: var(--text-muted);
      max-width: 52ch;
      margin-bottom: 44px;
      font-weight: 400;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 26px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .link-card-icon {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(247, 246, 242, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(212, 209, 202, 0.25);
    }

    .link-card-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Wide icon variant for logos that include a wordmark (no tile, fully transparent). */
    .link-card-icon--wide {
      width: 96px;
      height: 68px;
      border-radius: 0;
      background: transparent;
      border: none;
      overflow: visible;
    }

    .link-card-icon--placeholder {
      background: rgba(196, 151, 59, 0.10);
      border-color: rgba(196, 151, 59, 0.25);
      color: var(--accent-gold);
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.2rem;
      font-weight: 500;
    }

    .link-card:hover {
      background: rgba(196, 151, 59, 0.06);
      border-color: rgba(196, 151, 59, 0.45);
      transform: translateX(4px);
    }

    .link-card-text { display: flex; flex-direction: column; gap: 2px; flex: 1 1 auto; min-width: 0; }

    .link-card-title {
      font-family: var(--font-heading);
      font-weight: 500;
      font-size: 1.3rem;
      letter-spacing: -0.005em;
      color: var(--text-primary);
    }

    .link-card-host {
      font-family: var(--font-body);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .link-card-arrow {
      font-family: var(--font-body);
      font-size: 1.3rem;
      color: var(--accent-gold);
      transition: transform 220ms cubic-bezier(0.4, 0, 0.2, 1);
      line-height: 1;
    }

    .link-card:hover .link-card-arrow { transform: translateX(6px); }

    .portrait {
      position: relative;
      align-self: center;
      justify-self: end;
      margin-right: 40px;
    }

    .portrait img {
      display: block;
      width: 100%;
      max-width: 364px;
      height: auto;
      filter: saturate(1.02);
      position: relative;
      z-index: 1;
      border-radius: 10px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.85) 10%, #000 22%);
              mask-image: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.85) 10%, #000 22%);
    }

    .caption {
      margin-top: 18px;
      text-align: center;
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }

    .caption span { color: var(--accent-gold); font-style: normal; font-weight: 500; }

    @media (max-width: 960px) {
      .wrap {
        grid-template-columns: 1fr;
        gap: 48px;
        padding: 32px 24px 64px;
        min-height: 0;
      }
      .nav { padding: 24px 24px 0; }
      .content { max-width: 100%; order: 2; }
      .portrait { order: 1; max-width: 320px; margin: 0 auto; justify-self: center; margin-right: auto; }
      .portrait img { max-width: 320px; }
      h1 { font-size: clamp(2.2rem, 8vw, 3.2rem); }
      .intro { margin-bottom: 32px; }
    }

    @media (max-width: 480px) {
      .link-card { padding: 18px 20px; }
      .link-card-title { font-size: 1.12rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="content">
      <div class="eyebrow">Personal Hub</div>
      <h1>Welcome to <em>Brendo's Life</em></h1>
      <p class="intro">
        A small corner of the internet for the things and people that matter most.
      </p>

      <nav class="links" aria-label="Primary links">
        <a class="link-card" href="https://thebrushtongroup.com" target="_blank" rel="noopener">
          <span class="link-card-icon" aria-hidden="true">
            <img src="/icon-brushton.jpg" alt="" />
          </span>
          <span class="link-card-text">
            <span class="link-card-title">The Brushton Group</span>
            <span class="link-card-host">thebrushtongroup.com</span>
          </span>
          <span class="link-card-arrow" aria-hidden="true">&rarr;</span>
        </a>

        <a class="link-card" href="https://brendanoconnor.net" target="_blank" rel="noopener">
          <span class="link-card-icon" aria-hidden="true">
            <img src="/icon-brendanoconnor.jpg" alt="" />
          </span>
          <span class="link-card-text">
            <span class="link-card-title">Brendan's Career Page</span>
            <span class="link-card-host">brendanoconnor.net</span>
          </span>
          <span class="link-card-arrow" aria-hidden="true">&rarr;</span>
        </a>

        <a class="link-card" href="/marcela">
          <span class="link-card-icon link-card-icon--wide" aria-hidden="true">
            <img src="/marcela-logo-darkbg.png" alt="" />
          </span>
          <span class="link-card-text">
            <span class="link-card-title">Marcela Arenas</span>
            <span class="link-card-host">brendoslife.com/marcela</span>
          </span>
          <span class="link-card-arrow" aria-hidden="true">&rarr;</span>
        </a>
      </nav>
    </section>

    <aside class="portrait" aria-label="Photograph">
      <img src="/Betsy-with-Rose.jpg" alt="Betsy the dog holding a red rose" loading="eager" />
    </aside>
  </main>
</body>
</html>
